  <line x1="20" y1="24" x2="52" y2="24" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="36" x2="44" y2="36" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
