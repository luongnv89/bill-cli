repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      # Pre-push hooks: require the project venv (.venv) to be set up.
      # See README "Development" for venv setup. Tests need the project's
      # heavy deps (easyocr, paddle), so we don't pin them per-hook.
      - id: pytest
        name: pytest (requires activated .venv)
        entry: bash -c 'if [ -x .venv/bin/pytest ]; then .venv/bin/pytest -q --tb=short; else pytest -q --tb=short; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: e2e
        name: e2e smoke tests (requires activated .venv)
        entry: bash scripts/e2e_test.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
